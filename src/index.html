<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面宠物 · 小橘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-root">
  <div id="pet-container">
    <canvas id="pet-canvas" width="200" height="250"></canvas>
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">🍖</span>
        <div class="status-meter"><div id="hunger-fill" class="status-fill hunger"></div></div>
      </div>
      <div class="status-item">
        <span class="status-label">❤️</span>
        <div class="status-meter"><div id="happy-fill" class="status-fill happy"></div></div>
      </div>
    </div>
  </div>
  <!-- Chat panel, toolbar, settings injected by JS -->
</div>

<script src="constants.js"></script>
<script src="utils.js"></script>
<script src="stats.js"></script>
<script src="speech.js"></script>
<script src="persona.js"></script>
<script src="llm-client.js"></script>
<script src="chat-ui.js"></script>
<script src="toolbar.js"></script>
<script src="side-hide.js"></script>
<script src="work-system.js"></script>
<script src="settings-panel.js"></script>
<script src="pet.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>
</body>
</html>
