<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面宠物 · 小橘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-root">
  <div id="pet-container">
    <canvas id="pet-canvas" width="350" height="400"></canvas>
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">🍖</span>
        <div class="status-meter"><div id="hunger-fill" class="status-fill hunger"></div></div>
      </div>
      <div class="status-item">
        <span class="status-label">❤️</span>
        <div class="status-meter"><div id="happy-fill" class="status-fill happy"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Types -->
<script src="animation/anim-types.js"></script>
<!-- Utils -->
<script src="utils/constants.js"></script>
<script src="utils/helpers.js"></script>
<!-- Animation (real PNG frames) -->
<script src="animation/png-loader.js"></script>
<script src="animation/graph-core.js"></script>
<!-- Display -->
<script src="display/message-bar.js"></script>
<script src="display/effects.js"></script>
<script src="display/renderer.js"></script>
<!-- Core -->
<script src="core/controller.js"></script>
<script src="core/game-core.js"></script>
<!-- Pet -->
<script src="pet/pet-logic.js"></script>
<!-- Systems -->
<script src="systems/stats.js"></script>
<script src="systems/work.js"></script>
<!-- AI -->
<script src="ai/persona.js"></script>
<script src="ai/llm-client.js"></script>
<script src="ai/chat-ui.js"></script>
<script src="ai/ai-settings.js"></script>
<!-- UI -->
<script src="ui/toolbar.js"></script>
<script src="ui/side-hide.js"></script>
<!-- App -->
<script src="app.js"></script>
</body>
</html>
