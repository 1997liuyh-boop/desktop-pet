<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置 - Desktop Pet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px 24px;
      user-select: none;
      -webkit-user-select: none;
    }
    h2 {
      font-size: 16px;
      color: #fff;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .section {
      margin-bottom: 14px;
    }
    .section label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    .section input, .section select {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .section input:focus, .section select:focus {
      border-color: rgba(100,150,255,0.5);
    }
    .section input[type="password"] {
      font-family: monospace;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .btn-row button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save {
      background: rgba(100,150,255,0.3);
      color: #d0d8ff;
    }
    .btn-save:hover { background: rgba(100,150,255,0.5); }
    .btn-close {
      background: rgba(255,255,255,0.06);
      color: #999;
    }
    .btn-close:hover { background: rgba(255,255,255,0.12); }
    .status-msg {
      margin-top: 12px;
      font-size: 12px;
      color: #4a4;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>LLM 设置</h2>

  <div class="section">
    <label>API 地址</label>
    <input type="text" id="endpoint" placeholder="https://api.openai.com/v1/chat/completions" />
  </div>
  <div class="section">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
  </div>
  <div class="section">
    <label>模型</label>
    <input type="text" id="model" placeholder="gpt-3.5-turbo" />
  </div>
  <div class="section">
    <label>Temperature</label>
    <input type="text" id="temperature" placeholder="0.8" />
  </div>
  <div class="section">
    <label>协议</label>
    <select id="protocol">
      <option value="openai">OpenAI 兼容</option>
      <option value="anthropic">Anthropic 兼容</option>
    </select>
  </div>
  <div class="section">
    <label>人设</label>
    <select id="persona"></select>
  </div>

  <div class="btn-row">
    <button class="btn-save" id="btn-save">保存</button>
    <button class="btn-close" id="btn-close">关闭</button>
  </div>
  <div class="status-msg" id="status-msg"></div>

  <script src="scripts/settings.js"></script>
</body>
</html>
