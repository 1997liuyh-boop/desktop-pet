<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Pet</title>
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    /* 透明窗口基础样式 — 覆盖全窗口 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <canvas id="pet-canvas" width="500" height="500"></canvas>
  </div>

  <!-- 通信验证状态 -->
  <div id="status-bar" style="
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: rgba(0,0,0,0.6);
    color: #0f0;
    font-size: 12px;
    font-family: monospace;
    line-height: 24px;
    padding: 0 8px;
    display: none;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.3s;
  ">
    <span id="status-rust">Rust: ...</span>
    <span id="status-fps">FPS: --</span>
    <span id="status-anim">Anim: --</span>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
